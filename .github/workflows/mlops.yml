name: MLOps Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 - UNIT TEST
  # Chay unit tests tren du lieu ao (khong can ket noi cloud storage).
  # Neu co bat ky test nao that bai, pipeline dung lai o day va khong tien hanh
  # huan luyen hay trien khai.
  # ---------------------------------------------------------------------------
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v


  # ---------------------------------------------------------------------------
  # JOB 2 - TRAIN
  # Xac thuc cloud storage, pull du lieu bang DVC, huan luyen mo hinh, upload artifact.
  # Chi chay khi Job 1 (Unit Test) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Cloud Storage
        env:
          CREDS: ${{ secrets.CLOUD_CREDENTIALS }}
        run: |
          python - <<'EOF'
          import json, os, sys
          creds_str = os.environ.get("CREDS", "").strip()
          if not creds_str:
              print("Error: CLOUD_CREDENTIALS secret is empty or not set.")
              sys.exit(1)
          
          print(f"Diagnostics: CLOUD_CREDENTIALS length is {len(creds_str)} characters.")
          print(f"Diagnostics: Starts with '{creds_str[0]}' and ends with '{creds_str[-1]}'")
          
          try:
              creds = json.loads(creds_str)
              creds_lower = {k.lower().strip(): v for k, v in creds.items()}
              with open(os.environ["GITHUB_ENV"], "a") as f:
                  if "aws_access_key_id" in creds_lower:
                      f.write(f"AWS_ACCESS_KEY_ID={creds_lower['aws_access_key_id'].strip()}\n")
                      f.write(f"AWS_SECRET_ACCESS_KEY={creds_lower['aws_secret_access_key'].strip()}\n")
                      print("Successfully configured AWS credentials from JSON.")
                  elif "private_key" in creds_lower or "project_id" in creds_lower:
                      with open("/tmp/sa-key.json", "w") as kf:
                          json.dump(creds, kf)
                      f.write("GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json\n")
                      print("Successfully configured GCP credentials from JSON.")
                  else:
                      print("Error: JSON credentials do not contain 'aws_access_key_id' or GCP keys.")
                      print(f"Available keys in JSON: {list(creds.keys())}")
                      sys.exit(1)
          except json.JSONDecodeError as e:
              print(f"CLOUD_CREDENTIALS is not valid JSON ({e}). Attempting plain text parsing...")
              lines = [line.strip() for line in creds_str.split('\n') if line.strip() and not line.startswith('#')]
              parsed_env = {}
              for line in lines:
                  if '=' in line:
                      k, v = line.split('=', 1)
                      parsed_env[k.strip().upper()] = v.strip().strip('"').strip("'")
              
              if "AWS_ACCESS_KEY_ID" in parsed_env and "AWS_SECRET_ACCESS_KEY" in parsed_env:
                  with open(os.environ["GITHUB_ENV"], "a") as f:
                      f.write(f"AWS_ACCESS_KEY_ID={parsed_env['AWS_ACCESS_KEY_ID']}\n")
                      f.write(f"AWS_SECRET_ACCESS_KEY={parsed_env['AWS_SECRET_ACCESS_KEY']}\n")
                  print("Successfully configured AWS credentials from plain text key=value pairs.")
              else:
                  with open(os.environ["GITHUB_ENV"], "a") as f:
                      f.write(f"AZURE_STORAGE_CONNECTION_STRING={creds_str}\n")
                  print("Configured raw credentials as AZURE_STORAGE_CONNECTION_STRING.")
          EOF


      - name: Pull data with DVC
        run: dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT

      - name: Upload model to Cloud Storage
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}
        run: |
          python - <<'EOF'
          import os, sys
          bucket_name = os.environ.get("CLOUD_BUCKET")
          if not bucket_name:
              print("Error: CLOUD_BUCKET is not set.")
              sys.exit(1)
          local_file = "models/model.pkl"
          remote_key = "models/latest/model.pkl"
          if os.environ.get("AWS_ACCESS_KEY_ID"):
              try:
                  import boto3
                  print(f"Uploading {local_file} to S3 bucket {bucket_name} as {remote_key}...")
                  s3 = boto3.client('s3')
                  s3.upload_file(local_file, bucket_name, remote_key)
                  print("Upload to S3 successful.")
              except Exception as e:
                  print(f"S3 Upload failed: {e}")
                  sys.exit(1)
          elif os.environ.get("GOOGLE_APPLICATION_CREDENTIALS"):
              try:
                  from google.cloud import storage
                  print(f"Uploading {local_file} to GCS bucket {bucket_name} as {remote_key}...")
                  client = storage.Client()
                  bucket = client.bucket(bucket_name)
                  blob = bucket.blob(remote_key)
                  blob.upload_from_filename(local_file)
                  print("Upload to GCS successful.")
              except Exception as e:
                  print(f"GCS Upload failed: {e}")
                  sys.exit(1)
          else:
              print("Error: No valid AWS or GCP credentials found in environment.")
              sys.exit(1)
          EOF

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json


  # ---------------------------------------------------------------------------
  # JOB 3 - EVAL
  # Kiem tra nguong chat luong (accuracy >= 0.70).
  # Pipeline dung lai o day neu mo hinh chua dat yeu cau.
  # Chi chay khi Job 2 (Train) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:

      - name: Check eval gate
        run: |
          python - <<'EOF'
          acc = float("${{ needs.train.outputs.accuracy }}")
          if acc < 0.70:
              raise SystemExit(f"FAILED: accuracy {acc:.4f} < 0.70. Huy deploy.")
          print(f"PASSED: accuracy {acc:.4f} >= 0.70. Dang trien khai model.")
          EOF


  # ---------------------------------------------------------------------------
  # JOB 4 - DEPLOY
  # Trien khai len VM qua SSH.
  # Chi chay khi Job 3 (Eval) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:

      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            sleep 5
            curl -sf http://localhost:8000/health && echo "Health check passed." || exit 1

